<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HubSenior | Dietas</title>
  <link rel="stylesheet" href="../login/style.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="background"></div>

  <main class="container">
    <div class="login-box">

      <h1 class="logo">HubSenior</h1>
      <p class="subtitle">Cadastro de Dieta e Refeicoes</p>
      <div class="messageField" id="messageNutri"></div>

      <form id="formDieta">

        <div class="input-box">
          <input type="number" id="idCliente" required>
          <label>ID do Cliente</label>
        </div>

        <div class="input-box">
          <input type="date" id="dataInicio" required>
          <label>Data Inicio</label>
        </div>

        <div class="input-box">
          <input type="date" id="dataFim">
          <label>Data Fim</label>
        </div>

        <div class="input-box">
          <input type="text" id="tituloDieta">
          <label>Titulo da Dieta</label>
        </div>

        <div class="input-box">
          <input type="text" id="objetivos">
          <label>Objetivos</label>
        </div>

        <div class="input-box">
          <input type="text" id="observacoesGerais">
          <label>Observacoes Gerais</label>
        </div>

        <h3 class="section-title">Refeicoes</h3>
        <div id="listaRefeicoes"></div>
        <button class="secondary-btn" id="adicionarRefeicao" type="button">Adicionar Refeicao</button>

        <button id="loginBtn" type="submit">Salvar Dieta</button>
        <button class="secondary-btn" id="carregarDietasNutri" type="button">Carregar Dietas do Cliente</button>
      </form>

      <div id="listaDietasNutri" class="lista-dietas"></div>

    </div>
  </main>

  <script src="./index.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastrar Dieta - HubSenior</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="form-container">
    <div class="form-card">
      <h1>Cadastrar Dieta</h1>
      <div class="messageField"></div>
      <form id="dietaForm">
        <div class="form-group">
          <label for="id_cliente">ID do Cliente:</label>
          <input type="number" id="id_cliente" required>
        </div>
        <div class="form-group">
          <label for="data_inicio">Data de Início:</label>
          <input type="date" id="data_inicio" required>
        </div>
        <div class="form-group">
          <label for="data_fim">Data de Fim:</label>
          <input type="date" id="data_fim">
        </div>
        <div class="form-group">
          <label for="titulo_dieta">Título da Dieta:</label>
          <input type="text" id="titulo_dieta" placeholder="Ex: Dieta Low Carb">
        </div>
        <div class="form-group">
          <label for="refeicao1">Refeição 1:</label>
          <textarea id="refeicao1" placeholder="Descrição da refeição 1"></textarea>
        </div>
        <div class="form-group">
          <label for="refeicao2">Refeição 2:</label>
          <textarea id="refeicao2" placeholder="Descrição da refeição 2"></textarea>
        </div>
        <div class="form-group">
          <label for="refeicao3">Refeição 3:</label>
          <textarea id="refeicao3" placeholder="Descrição da refeição 3"></textarea>
        </div>
        <div class="form-group">
          <label for="refeicao4">Refeição 4:</label>
          <textarea id="refeicao4" placeholder="Descrição da refeição 4"></textarea>
        </div>
        <div class="form-group">
          <label for="detalhes_alimentos">Detalhes dos Alimentos:</label>
          <textarea id="detalhes_alimentos" placeholder="Detalhes adicionais"></textarea>
        </div>
        <div class="form-group">
          <label for="objetivos">Objetivos:</label>
          <textarea id="objetivos" placeholder="Objetivos da dieta"></textarea>
        </div>
        <div class="form-group">
          <button type="submit">Cadastrar Dieta</button>
        </div>
      </form>
    </div>
  </main>
  <script src="./index.js"></script>
</body>
</html>

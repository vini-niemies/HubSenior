<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - HubSenior</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <main class="login-container">
    <div class="login-form">
      <h1>Login</h1>
      <div class="messageField"></div>
      <form>
        <div class="form-group">
          <label for="role">Tipo de Usuário:</label>
          <select id="role">
            <option value="cliente">Cliente</option>
            <option value="nutri">Nutricionista</option>
          </select>
        </div>
        <div class="form-group">
          <label for="email">E-mail:</label>
          <input type="email" placeholder="Digite seu e-mail" id="email" required>
        </div>
        <div class="form-group">
          <label for="senha">Senha:</label>
          <div class="password-container">
            <input type="password" placeholder="Digite sua senha" id="senha" required>
            <button type="button" class="toggle-password">Ver</button>
          </div>
        </div>
        <div class="form-group">
          <button type="submit" id="loginBtn">Entrar</button>
        </div>
      </form>
    </div>
  </main>
  <script src="./index.js"></script>
</body>
</html>\

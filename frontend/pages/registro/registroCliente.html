<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HubSenior</title>
  <link rel="stylesheet" href="../login/style.css">
</head>
<body>

  <div class="background"></div>

  <main class="container">
    <div class="login-box">

      <h1 class="logo">HubSenior</h1>
      <p class="subtitle">Cadastro do Cliente</p>

      <form id="formCliente">

        <div class="input-box">
          <input type="text" id="clienteCodigo" required>
          <label>Código do Nutricionista</label>
        </div>

        <div class="input-box">
          <input type="text" id="clienteNome" required>
          <label>Nome Completo</label>
        </div>

        <div class="input-box">
          <input type="email" id="clienteEmail" required>
          <label>E-mail</label>
        </div>

        <div class="input-box">
          <input type="password" id="clienteSenha" required>
          <label>Senha</label>
        </div>

        <div class="input-box">
          <input type="date" id="clienteDataNascimento" required>
          <label>Data de Nascimento</label>
        </div>

        <div class="input-box">
          <input type="text" id="clienteEndereco" required>
          <label>Endereço</label>
        </div>

        <div class="input-box">
          <input type="text" id="clienteObjetivo" required>
          <label>Objetivo</label>
        </div>

        <div class="input-box">
          <input type="text" id="clienteEmail2" required>
          <label>Email de recuperação:</label>
        </div>

        <button id="loginBtn" type="submit">Criar Conta</button>
        <p class="signup-text">Já possui conta? <a href="../login/index.html" class="signup-link">Fazer login</a>
      </form>

    </div>
  </main>

  <script src="./index.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HubSenior</title>
    <link rel="stylesheet" href="../../styles/base.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <div class="background"></div>

    <main class="container">
        <div class="login-box">

            <h1 class="logo">HubSenior</h1>
            <p class="subtitle">Cadastro do Personal Trainer</p>

            <div class="messageField"></div>

            <form id="formPerso">

                <div class="input-box">
                    <input type="text" id="persoNome" required>
                    <label>Nome Completo</label>
                </div>

                <div class="input-box">
                    <input type="text" id="persoCref" required>
                    <label>CREF</label>
                </div>

                <div class="input-box">
                    <input type="email" id="persoEmail" required>
                    <label>E-mail</label>
                </div>

                <div class="input-box">
                    <input type="password" id="persoSenha" required>
                    <label>Senha</label>
                </div>

                <div class="input-box">
                    <input type="text" id="persoTelefone" required>
                    <label>Telefone</label>
                </div>

                <div class="input-box">
                    <input type="text" id="persoInstagram">
                    <label>Instagram</label>
                </div>

                <div class="input-box">
                    <input type="text" id="persoEndereco">
                    <label>Endereço</label>
                </div>

                <button id="loginBtn" type="submit">Criar Conta</button>
            </form>

        </div>
    </main>

    <script src="./index.js"></script>
</body>

</html>

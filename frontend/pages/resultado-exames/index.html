<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastrar Resultado de Exames - HubSenior</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="form-container">
    <div class="form-card">
      <h1>Cadastrar Resultado de Exames</h1>
      <div class="messageField"></div>
      <form id="resultadoExamesForm">
        <div class="form-group">
          <label for="id_cliente">ID do Cliente:</label>
          <input type="number" id="id_cliente" required>
        </div>
        <div class="form-group">
          <label for="data_realizacao">Data de Realização:</label>
          <input type="date" id="data_realizacao" required>
        </div>
        <div class="form-group">
          <label for="percentual_gordura">Percentual de Gordura (%):</label>
          <input type="number" step="0.01" id="percentual_gordura">
        </div>
        <div class="form-group">
          <label for="massa_magra">Massa Magra (kg):</label>
          <input type="number" step="0.01" id="massa_magra">
        </div>
        <div class="form-group">
          <label for="gordura_visceral">Gordura Visceral:</label>
          <input type="number" id="gordura_visceral">
        </div>
        <div class="form-group">
          <label for="taxa_metabolica_basal">Taxa Metabólica Basal (kcal):</label>
          <input type="number" id="taxa_metabolica_basal">
        </div>
        <div class="form-group">
          <label for="colesterol_total">Colesterol Total (mg/dL):</label>
          <input type="number" id="colesterol_total">
        </div>
        <div class="form-group">
          <label for="glicemia_jejum">Glicemia em Jejum (mg/dL):</label>
          <input type="number" id="glicemia_jejum">
        </div>
        <div class="form-group">
          <label for="outros_marcadores">Outros Marcadores:</label>
          <textarea id="outros_marcadores" placeholder="Outros resultados ou observações"></textarea>
        </div>
        <div class="form-group">
          <button type="submit">Cadastrar Resultado</button>
        </div>
      </form>
    </div>
  </main>
  <script src="./index.js"></script>
</body>
</html>
